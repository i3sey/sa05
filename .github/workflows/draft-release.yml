name: Draft Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, for example 1.0.1"
        required: true
        type: string
      version_code:
        description: "Android versionCode, must increase for each release"
        required: true
        type: number
      changelog:
        description: "Release changelog"
        required: false
        type: string

permissions:
  contents: write

jobs:
  draft-release:
    name: Build APK and draft release
    runs-on: ubuntu-latest

    env:
      VERSION_NAME: ${{ inputs.version_name }}
      VERSION_CODE: ${{ inputs.version_code }}
      TAG_NAME: v${{ inputs.version_name }}
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)?$ ]] || {
            echo "version_name must look like 1.0, 1.0.1, or 1.0.1-beta1" >&2
            exit 1
          }
          [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]] || {
            echo "version_code must be a positive integer" >&2
            exit 1
          }
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?Missing signing secret ANDROID_RELEASE_KEYSTORE_BASE64}"
          : "${ANDROID_RELEASE_KEYSTORE_PASSWORD:?Missing signing secret ANDROID_RELEASE_KEYSTORE_PASSWORD}"
          : "${ANDROID_RELEASE_KEY_ALIAS:?Missing signing secret ANDROID_RELEASE_KEY_ALIAS}"
          : "${ANDROID_RELEASE_KEY_PASSWORD:?Missing signing secret ANDROID_RELEASE_KEY_PASSWORD}"

      - name: Decode signing key
        shell: bash
        run: |
          set -euo pipefail
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sa05-release.jks"
          printf 'RELEASE_KEYSTORE_FILE=%s\n' "$RUNNER_TEMP/sa05-release.jks" >> "$GITHUB_ENV"

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/sa05-${VERSION_NAME}-release.apk"

      - name: Write changelog
        shell: bash
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          {
            printf 'versionName: %s\n' "$VERSION_NAME"
            printf 'versionCode: %s\n' "$VERSION_CODE"
            printf 'asset: sa05-%s-release.apk\n' "$VERSION_NAME"
            printf '\n'
            if [[ -n "${CHANGELOG:-}" ]]; then
              printf '%s\n' "$CHANGELOG"
            else
              printf '%s\n' "No changelog provided."
            fi
          } > release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" release/*.apk \
            --draft \
            --target "$GITHUB_SHA" \
            --title "SA05 $VERSION_NAME" \
            --notes-file release-notes.md

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa05-${{ inputs.version_name }}-release-apk
          path: release/*.apk
          if-no-files-found: error
