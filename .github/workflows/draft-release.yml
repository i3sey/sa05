name: Draft Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name, for example 1.0.1"
        required: true
        type: string
      version_code:
        description: "Android versionCode, must increase for each release"
        required: true
        type: number
      changelog:
        description: "Release changelog"
        required: false
        type: string
      allow_debug_signing:
        description: "Allow debug signing fallback. Do not use for real releases."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  draft-release:
    name: Build APK and draft release
    runs-on: ubuntu-latest

    env:
      VERSION_NAME: ${{ inputs.version_name }}
      VERSION_CODE: ${{ inputs.version_code }}
      TAG_NAME: v${{ inputs.version_name }}
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
      ALLOW_DEBUG_SIGNING: ${{ inputs.allow_debug_signing }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION_NAME" =~ ^[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)?$ ]] || {
            echo "version_name must look like 1.0, 1.0.1, or 1.0.1-beta1" >&2
            exit 1
          }
          [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]] || {
            echo "version_code must be a positive integer" >&2
            exit 1
          }

      - name: Configure signing key
        shell: bash
        run: |
          set -euo pipefail
          signing_values=(
            "$ANDROID_RELEASE_KEYSTORE_BASE64"
            "$ANDROID_RELEASE_KEYSTORE_PASSWORD"
            "$ANDROID_RELEASE_KEY_ALIAS"
            "$ANDROID_RELEASE_KEY_PASSWORD"
          )
          present=0
          for value in "${signing_values[@]}"; do
            if [[ -n "$value" ]]; then
              present=$((present + 1))
            fi
          done
          if [[ "$present" -eq 0 ]]; then
            if [[ "$ALLOW_DEBUG_SIGNING" == "true" ]]; then
              echo "Release signing secrets are not configured; building with debug signing fallback."
              exit 0
            fi
            echo "Release signing secrets are not configured. Refusing to create a real release with debug signing." >&2
            echo "Set all signing secrets, or rerun with allow_debug_signing=true for a test APK." >&2
            exit 1
          fi
          if [[ "$present" -ne 4 ]]; then
            echo "Configure all signing secrets or leave all of them empty:" >&2
            echo "ANDROID_RELEASE_KEYSTORE_BASE64, ANDROID_RELEASE_KEYSTORE_PASSWORD, ANDROID_RELEASE_KEY_ALIAS, ANDROID_RELEASE_KEY_PASSWORD" >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/sa05-release.jks"
          {
            printf 'RELEASE_KEYSTORE_FILE=%s\n' "$RUNNER_TEMP/sa05-release.jks"
            printf 'RELEASE_KEYSTORE_PASSWORD=%s\n' "$ANDROID_RELEASE_KEYSTORE_PASSWORD"
            printf 'RELEASE_KEY_ALIAS=%s\n' "$ANDROID_RELEASE_KEY_ALIAS"
            printf 'RELEASE_KEY_PASSWORD=%s\n' "$ANDROID_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
          echo "Release signing configured."

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Verify release signing
        shell: bash
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/apk-signing.txt"
          apksigner="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          "$apksigner" verify \
            --verbose \
            --print-certs \
            app/build/outputs/apk/release/app-release.apk | tee "$report"
          if grep -q "CN=Android Debug" "$report"; then
            echo "APK is signed with the Android debug certificate. Refusing to create a release." >&2
            exit 1
          fi

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/sa05-${VERSION_NAME}-release.apk"

      - name: Write changelog
        shell: bash
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          {
            printf 'versionName: %s\n' "$VERSION_NAME"
            printf 'versionCode: %s\n' "$VERSION_CODE"
            printf 'asset: sa05-%s-release.apk\n' "$VERSION_NAME"
            printf '\n'
            if [[ -n "${CHANGELOG:-}" ]]; then
              printf '%s\n' "$CHANGELOG"
            else
              printf '%s\n' "No changelog provided."
            fi
          } > release-notes.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" release/*.apk \
            --draft \
            --target "$GITHUB_SHA" \
            --title "SA05 $VERSION_NAME" \
            --notes-file release-notes.md

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sa05-${{ inputs.version_name }}-release-apk
          path: release/*.apk
          if-no-files-found: error
